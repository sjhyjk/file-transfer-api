name: Docker Build Check

on:
  push:
    branches: [ main ] # mainブランチにpushされたら実行
  workflow_dispatch: # GitHub Actionsの画面から手動実行が可能

jobs:
  build:
    runs-on: ubuntu-latest # GitHub側のマシンで実行されるので、自分のPCは重くならない
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    # ✅ v4 から v6 に更新 (Node.js 24 対応)
    - name: Checkout code
      uses: actions/checkout@v6
      env:
        # 「デフォルトブランチ名は main です」と、実行の瞬間に Git に直接叩き込む
        GIT_CONFIG_PARAMETERS: "'init.defaultBranch=main'"

    # 💡 Git のデフォルトブランチ警告を抑制
    - name: Configure Git
      run: git config --global init.defaultBranch main

    # ✅ v5 から v6 に更新 (Node.js 24 対応)
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25' # 1.24 から 1.25 へ。これでツールチェーンの自動DLをスキップできます
        cache: true        # 依存関係のキャッシュを有効化して、さらに高速化

# --- ここから「Push時」にも必ず走る高品質化ステップ ---
    # ==========================================
    # Phase 1: Quality Gate (Push & Manual)
    # 常に実行され、コードの健全性を担保するセーフティ工程
    # ==========================================

    # ✅ ステップ1: Go 基本品質チェック（静的解析・コンパイル）
    # 依存関係、コードの整合性、潜在的なバグをまとめて検証します。
    # go.mod / go.sum の更新漏れを検知し、ビルドの再現性を守ります。
    - name: Basic Quality Check
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum || (echo "Please run 'go mod tidy' and commit the changes" && exit 1)
        # コンパイルは通るが潜在的なバグの原因になりそうなコードを検知します。
        go vet ./...
        # 全パッケージが正しくビルド可能か、Dockerビルド前に検証します
        go build -v ./... # 全パッケージのコンパイルチェック（バイナリは作成せず検証のみ）

    # ✅ ステップ2: 高度な静的解析 (Linter)
    # go vet よりも遥かに厳しいチェック（未使用変数、複雑度、スペルミス等）を行い、
    # チーム開発における「読みやすさ」を機械的に担保します。
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

    # ✅ ステップ3: ユニットテスト（モック環境）の実行
    # これが失敗すると、下のビルドやデプロイは実行されません（安全！）
    # env を追加し、テストが「モックモード」で動くことを明示します。
    - name: Run Tests
      env:
        # コード側で os.Getenv("STORAGE_TYPE") を見ている場合、
        # ここで mock や local を渡すことで、CI上での不要なエラーを防ぎます。
        STORAGE_TYPE: mock
        DATABASE_URL: postgres://dummy:dummy@localhost:5432/dummy
      run: go test -v ./...

    # ✅ ステップ4: アーキテクチャの静的解析
    # 設計原則（DIP等）がコードレベルで守られているかを強制します。
    - name: Architecture Check
      run: |
        # インストールと実行を分離せず、直接 go run で実行する
        go run github.com/fe3dback/go-arch-lint@latest check

    # --- ここから「手動実行（workflow_dispatch）」時のみ走るステップ ---

    # ==========================================
    # Phase 2: Cloud Deployment (Manual Only)
    # workflow_dispatch 時のみ実行される
    # ==========================================
    
    # ✅ ステップ5: Google Cloud 認証
    # Keyless（Workload Identity）移行を見据えた構成でセキュアに認証します。
    # 認証情報を更新すれば、即座にフルオートメーションが再開可能な状態で維持しています。
    # Workload Identity 等の設定が済むまでは、サービスアカウントキー（JSON）を
    # GitHub Secrets (GCP_SA_KEY) に登録して使う方式が一般的です。
    - name: Google Auth
      if: github.event_name == 'workflow_dispatch'
      uses: 'google-github-actions/auth@v2'
      with:
        # JSONキーを使わず、IDプールを指定する「Keyless」な記述
        # Terraformで作成したProviderのフルパスを指定
        # projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
        workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
        service_account: 'file-transfer-app-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

    # ✅ ステップ6: クラウド環境・Docker 認証
    - name: 'Set up Cloud SDK'
      if: github.event_name == 'workflow_dispatch'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Docker Auth'
      if: github.event_name == 'workflow_dispatch'
      run: |-
        gcloud auth configure-docker us-west1-docker.pkg.dev

    # ✅ ステップ7: Dockerビルド & プッシュ
    # Secretを参照するため手動実行に限定。SHAタグでトレーサビリティを確保します。
    - name: Build and Push Docker image
      if: github.event_name == 'workflow_dispatch'
      run: |
        docker build -t us-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo/file-transfer-api:${{ github.sha }} .
        docker push us-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo/file-transfer-api:${{ github.sha }}

    # ✅ ステップ8: Cloud Run へのデプロイ
    # 適切な環境変数とDB接続を構成し、最終的なリリースを実行します。
    - name: Deploy to Cloud Run
      if: github.event_name == 'workflow_dispatch'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: 'file-transfer-api'
        image: 'us-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo/file-transfer-api:${{ github.sha }}'
        region: 'us-west1'
        # 初回デプロイ時は、認証なしアクセスを許可（APIとして公開する場合）
        flags: |
          --allow-unauthenticated
          --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:us-west1:file-transfer-db
        # ★ ここを追加！
        env_vars: |
          STORAGE_TYPE=gcs
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          BUCKET_NAME=file-transfer-bucket-syou-20240121
          DATABASE_URL=postgres://app_user:${{ secrets.DB_PASSWORD }}@/transfer_metadata?host=/cloudsql/${{ secrets.GCP_PROJECT_ID }}:us-west1:file-transfer-db
