name: Docker Build Check

on:
  push:
    branches: [ main ] # mainブランチにpushされたら実行

jobs:
  build:
    runs-on: ubuntu-latest # GitHub側のマシンで実行されるので、自分のPCは重くならない

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

# ✅ ステップ1: テストの実行
    # これが失敗すると、下のビルドやデプロイは実行されません（安全！）
    - name: Run Tests
      run: go test -v ./...

    # ✅ ステップ2: Dockerビルド
    - name: Build Docker image
      run: docker build -t us-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo/file-transfer-api:${{ github.sha }} .
        # ここでビルド。実際のエンプラ環境ではこの後 Artifact Registry 等へ push します    
