version: "2"  # これが v2 系では必須になりました

run:
  timeout: 5m
  # ここに working-directory などの実行時設定が入ります

linters:
  # disable-all は linters.default: none に変更
  default: none
  enable:
    - errcheck
    - staticcheck # これに gosimple の機能が含まれています
    - unused
    - govet
  # 移行ガイドに従い、linters-settings ではなく settings を使用
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
        - fmt.Print
