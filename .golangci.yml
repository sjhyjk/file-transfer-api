version: "2"  # これが v2 系では必須になりました

run:
  timeout: 5m
  # ここに working-directory などの実行時設定が入ります

# 「linters-settings」ではなく「linter」に変更されています
linter:
  errcheck:
    exclude-functions:
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Printf
      - fmt.Print

# 「linters」ではなく「issues」セクションなどで管理する形式に統合が進んでいます
linters:
  enable:
    - errcheck
    - gosimple
    - staticcheck
    - unused
    - govet
